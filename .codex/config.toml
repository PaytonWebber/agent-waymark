[mcp_servers.agent-waymark]
command = "sh"
args = ["-lc", "mkdir -p .agent-waymark && AGENT_WAYMARK_SOCKET=\"$PWD/.agent-waymark/agent-waymark.sock\" AGENT_WAYMARK_STORE=\"$PWD/.agent-waymark/agent-waymark-state.json\" exec ./zig-out/bin/agent-waymark mcp"]
startup_timeout_sec = 10
