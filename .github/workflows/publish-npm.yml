name: Publish npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish npm packages
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const pkg = require("./package.json");
          const tag = process.env.GITHUB_REF_NAME;
          const expected = `v${pkg.version}`;
          if (tag !== expected) {
            console.error(`tag ${tag} does not match package version ${expected}`);
            process.exit(1);
          }
          for (const [name, version] of Object.entries(pkg.optionalDependencies ?? {})) {
            if (version !== pkg.version) {
              console.error(`${name} is pinned to ${version}, expected ${pkg.version}`);
              process.exit(1);
            }
          }
          NODE

      - name: Test
        run: zig build test --fetch

      - name: Integration smoke
        run: zig build integration

      - name: Build release packages
        run: node scripts/build-dist.mjs

      - name: Check package contents
        run: |
          npm pack --dry-run
          for package_dir in npm/linux-x64 npm/linux-arm64 npm/darwin-arm64 npm/darwin-x64; do
            npm pack --dry-run "./$package_dir"
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          publish_package() {
            package_path="$1"
            log_file="$(mktemp)"
            if npm publish "$package_path" --access public --provenance 2>&1 | tee "$log_file"; then
              rm -f "$log_file"
              return 0
            fi
            if grep -q "previously published versions" "$log_file"; then
              echo "$package_path is already published, skipping"
              rm -f "$log_file"
              return 0
            fi
            rm -f "$log_file"
            return 1
          }

          for package_dir in npm/linux-x64 npm/linux-arm64 npm/darwin-arm64 npm/darwin-x64; do
            publish_package "./$package_dir"
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          if npm publish . --access public --provenance 2>&1 | tee "$log_file"; then
            rm -f "$log_file"
            exit 0
          fi
          if grep -q "previously published versions" "$log_file"; then
            echo "agent-waymark is already published, skipping"
            rm -f "$log_file"
            exit 0
          fi
          rm -f "$log_file"
          exit 1
