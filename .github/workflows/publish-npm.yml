name: Publish npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish npm packages
    runs-on: ubuntu-latest
    environment: npm
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const pkg = require("./package.json");
          const tag = process.env.GITHUB_REF_NAME;
          const expected = `v${pkg.version}`;
          if (tag !== expected) {
            console.error(`tag ${tag} does not match package version ${expected}`);
            process.exit(1);
          }
          for (const [name, version] of Object.entries(pkg.optionalDependencies ?? {})) {
            if (version !== pkg.version) {
              console.error(`${name} is pinned to ${version}, expected ${pkg.version}`);
              process.exit(1);
            }
          }
          const fs = require("fs");
          const checks = [
            ["src/main.zig", /const version = "([^"]+)"/],
            ["build.zig.zon", /\.version = "([^"]+)"/],
          ];
          for (const [file, re] of checks) {
            const found = fs.readFileSync(file, "utf8").match(re)?.[1];
            if (found !== pkg.version) {
              console.error(`${file} has version ${found}, expected ${pkg.version}`);
              process.exit(1);
            }
          }
          NODE

      - uses: actions/cache@v4
        with:
          path: src/model
          key: potion-retrieval-32M-i8-v1

      - name: Fetch and quantize the embedding model
        run: |
          ./scripts/fetch-model.sh potion-retrieval-32M
          zig build quantize-model

      - name: Test
        run: zig build test --fetch

      - name: Integration smoke
        run: zig build integration

      - name: Build release packages
        run: node scripts/build-dist.mjs

      - name: Check package contents
        run: |
          npm pack --dry-run
          for package_dir in npm/linux-x64 npm/linux-arm64 npm/darwin-arm64 npm/darwin-x64; do
            npm pack --dry-run "./$package_dir"
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          publish_package() {
            package_path="$1"
            log_file="$(mktemp)"
            if npm publish "$package_path" --access public --provenance 2>&1 | tee "$log_file"; then
              rm -f "$log_file"
              return 0
            fi
            if grep -q "previously published versions" "$log_file"; then
              echo "$package_path is already published, skipping"
              rm -f "$log_file"
              return 0
            fi
            rm -f "$log_file"
            return 1
          }

          for package_dir in npm/linux-x64 npm/linux-arm64 npm/darwin-arm64 npm/darwin-x64; do
            publish_package "./$package_dir"
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -o pipefail
          log_file="$(mktemp)"
          if npm publish . --access public --provenance 2>&1 | tee "$log_file"; then
            rm -f "$log_file"
            exit 0
          fi
          if grep -q "previously published versions" "$log_file"; then
            echo "agent-waymark is already published, skipping"
            rm -f "$log_file"
            exit 0
          fi
          rm -f "$log_file"
          exit 1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists, skipping"
            exit 0
          fi
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## " ver " " { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ -s release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          fi
